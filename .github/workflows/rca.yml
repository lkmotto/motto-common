name: Auto RCA

on:
  schedule:
    - cron: "0 */6 * * *"  # Every 6 hours
  workflow_dispatch:        # Manual trigger for testing

permissions:
  contents: write           # To commit .rca_state.json back
  issues: write             # To create GitHub issues

jobs:
  auto-rca:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run Auto RCA
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG || 'lkmotto' }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT || 'motto-common' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: uv run python scripts/auto_rca.py

      - name: Commit state file
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/.rca_state.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore(rca): update RCA state file [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
