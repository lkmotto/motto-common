name: Auto Rollback Monitor

on:
  schedule:
    - cron: "*/30 * * * *"  # Every 30 minutes
  workflow_dispatch:         # Manual trigger for testing

permissions:
  contents: write            # To commit .rollback_state.json back
  issues: write              # To create rollback GitHub issues

jobs:
  auto-rollback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run Auto Rollback Monitor
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG || 'lkmotto' }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT || 'motto-common' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ROLLBACK_CRASH_FREE_THRESHOLD: ${{ vars.ROLLBACK_CRASH_FREE_THRESHOLD || '95.0' }}
          ROLLBACK_ERROR_RATE_THRESHOLD: ${{ vars.ROLLBACK_ERROR_RATE_THRESHOLD || '0.05' }}
          ROLLBACK_LOOKBACK_MINUTES: ${{ vars.ROLLBACK_LOOKBACK_MINUTES || '60' }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || '' }}
        run: uv run python scripts/auto_rollback.py

      - name: Commit state file
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/.rollback_state.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore(rollback): update rollback state file [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
